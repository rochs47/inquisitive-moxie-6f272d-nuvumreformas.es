<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f1e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="acGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background wall -->
  <rect width="400" height="500" fill="url(#wallGradient)"/>
  
  <!-- Light source -->
  <circle cx="350" cy="50" r="60" fill="#ffd700" opacity="0.15"/>
  
  <!-- Living room space -->
  <!-- Sofa back -->
  <ellipse cx="200" cy="420" rx="140" ry="40" fill="#8b7355" opacity="0.8"/>
  <rect x="80" y="390" width="240" height="60" fill="#a0876d" rx="10"/>
  
  <!-- Sofa cushions -->
  <circle cx="120" cy="375" r="25" fill="#b39986"/>
  <circle cx="200" cy="365" r="28" fill="#b39986"/>
  <circle cx="280" cy="375" r="25" fill="#b39986"/>
  
  <!-- Window -->
  <rect x="20" y="80" width="100" height="120" fill="#87ceeb" rx="4" stroke="#5a9fb5" stroke-width="2"/>
  <line x1="70" y1="80" x2="70" y2="200" stroke="#5a9fb5" stroke-width="2"/>
  <line x1="20" y1="140" x2="120" y2="140" stroke="#5a9fb5" stroke-width="2"/>
  
  <!-- AC Indoor Unit - Main Body -->
  <rect x="280" y="100" width="100" height="55" fill="url(#acGradient)" rx="8"/>
  
  <!-- AC Front Panel - Metallic look -->
  <defs>
    <linearGradient id="metallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8a8a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="287" y="107" width="86" height="41" fill="url(#metallic)" rx="4"/>
  
  <!-- Display screen -->
  <rect x="293" y="113" width="38" height="12" fill="#1a3a52" rx="2"/>
  <text x="312" y="121" text-anchor="middle" font-size="8" fill="#00ff00" font-family="monospace" font-weight="bold">22°C</text>
  
  <!-- Control buttons -->
  <circle cx="340" cy="119" r="3" fill="#666"/>
  <circle cx="351" cy="119" r="3" fill="#666"/>
  <circle cx="362" cy="119" r="3" fill="#666"/>
  
  <!-- Louver/Vent slats -->
  <g stroke="#7a7a7a" stroke-width="1.5" opacity="0.7">
    <line x1="293" y1="128" x2="379" y2="128"/>
    <line x1="293" y1="133" x2="379" y2="133"/>
    <line x1="293" y1="138" x2="379" y2="138"/>
  </g>
  
  <!-- Air flow indicators (cool air) -->
  <g>
    <!-- Right side air flow -->
    <path d="M 385 145 Q 390 155 385 165" stroke="#3498db" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="3,2"/>
    <polygon points="383,163 385,170 387,163" fill="#3498db"/>
    
    <!-- Center air flow -->
    <path d="M 330 145 Q 330 160 330 175" stroke="#3498db" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polygon points="326,170 330,178 334,170" fill="#3498db"/>
    
    <!-- Left side air flow -->
    <path d="M 305 145 Q 300 155 305 165" stroke="#3498db" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="3,2"/>
    <polygon points="307,163 305,170 303,163" fill="#3498db"/>
  </g>
  
  <!-- Temperature comfort indicator -->
  <circle cx="350" cy="240" r="35" fill="#2ecc71" opacity="0.9" stroke="#27ae60" stroke-width="2"/>
  <text x="350" y="235" text-anchor="middle" font-size="12" fill="white" font-weight="bold">CLIMA</text>
  <text x="350" y="250" text-anchor="middle" font-size="11" fill="white">Perfecto</text>
  
  <!-- Wall mounting bracket -->
  <g stroke="#999" stroke-width="1.5" fill="none">
    <line x1="290" y1="100" x2="280" y2="85"/>
    <line x1="280" y1="85" x2="290" y2="75"/>
    <line x1="380" y1="100" x2="390" y2="85"/>
    <line x1="390" y1="85" x2="380" y2="75"/>
  </g>
  
  <!-- Comfort zones showing temperature distribution -->
  <g opacity="0.3">
    <circle cx="200" cy="300" r="100" stroke="#3498db" stroke-width="1" fill="none" stroke-dasharray="5,5"/>
    <circle cx="200" cy="300" r="60" stroke="#2ecc71" stroke-width="1" fill="none" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a3a52" font-family="serif">
    Climatización
  </text>
  <text x="200" y="55" text-anchor="middle" font-size="13" fill="#666" font-family="sans-serif">
    Confort en tu hogar todo el año
  </text>
</svg>