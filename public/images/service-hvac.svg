<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background wall -->
  <rect width="400" height="500" fill="#e8dcc4"/>
  
  <!-- Wall pattern -->
  <defs>
    <pattern id="brickPattern" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="38" height="18" fill="none" stroke="#d4cbb3" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="500" fill="url(#brickPattern)"/>
  
  <!-- Dining room elements -->
  <!-- Table -->
  <rect x="50" y="350" width="300" height="15" fill="#8b5a3c" rx="2"/>
  <rect x="60" y="365" width="280" height="100" fill="#a0692f" opacity="0.7" rx="2"/>
  
  <!-- Chairs -->
  <g>
    <!-- Left chair -->
    <rect x="70" y="380" width="60" height="70" fill="#6b4423" rx="3"/>
    <circle cx="100" cy="340" r="15" fill="#6b4423"/>
    
    <!-- Right chair -->
    <rect x="270" y="380" width="60" height="70" fill="#6b4423" rx="3"/>
    <circle cx="300" cy="340" r="15" fill="#6b4423"/>
  </g>
  
  <!-- AC Unit on wall -->
  <g id="ac-unit">
    <!-- Main body -->
    <rect x="140" y="80" width="120" height="60" fill="#2c3e50" rx="8"/>
    
    <!-- Front panel -->
    <rect x="145" y="85" width="110" height="50" fill="#34495e" rx="6"/>
    
    <!-- Display/vent area -->
    <rect x="150" y="90" width="100" height="20" fill="#ecf0f1" rx="3"/>
    
    <!-- Slats/vents -->
    <g fill="#95a5a6">
      <rect x="150" y="115" width="100" height="3"/>
      <rect x="150" y="123" width="100" height="3"/>
      <rect x="150" y="131" width="100" height="3"/>
    </g>
    
    <!-- Control panel indicators -->
    <circle cx="160" cy="100" r="3" fill="#3498db"/>
    <circle cx="173" cy="100" r="3" fill="#2ecc71"/>
    <circle cx="186" cy="100" r="3" fill="#e74c3c"/>
    
    <!-- Air flow arrows -->
    <g stroke="#3498db" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 155 145 L 155 165"/>
      <path d="M 155 160 L 150 165 L 160 165"/>
      
      <path d="M 200 145 L 200 165"/>
      <path d="M 200 160 L 195 165 L 205 165"/>
      
      <path d="M 245 145 L 245 165"/>
      <path d="M 245 160 L 240 165 L 250 165"/>
    </g>
    
    <!-- Wall bracket lines -->
    <g stroke="#8b5a3c" stroke-width="1" stroke-dasharray="2,2">
      <line x1="140" y1="70" x2="140" y2="80"/>
      <line x1="260" y1="70" x2="260" y2="80"/>
    </g>
  </g>
  
  <!-- Temperature indicator -->
  <g>
    <circle cx="80" cy="50" r="25" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="80" y="58" text-anchor="middle" font-size="20" fill="white" font-weight="bold">24°</text>
  </g>
  
  <!-- Comfort symbol -->
  <g transform="translate(320, 50)">
    <circle cx="0" cy="0" r="20" fill="#2ecc71" opacity="0.9"/>
    <path d="M -8 2 Q -4 6 0 4 Q 4 6 8 2" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-4" cy="-2" r="1.5" fill="white"/>
    <circle cx="4" cy="-2" r="1.5" fill="white"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">
    Climatización
  </text>
  <text x="200" y="55" text-anchor="middle" font-size="12" fill="#555">
    Confort en tu hogar
  </text>
</svg>